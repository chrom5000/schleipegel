name: Badewasserdaten aktualisieren

on:
  schedule:
    - cron: '23 4 * * *'   # täglich 04:23 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Badewasserdaten holen
        run: python3 scripts/fetch_badewasser.py
      - name: Commit bei Änderung
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badewasser.json
          git diff --cached --quiet || git commit -m "Badewasserdaten: automatische Aktualisierung"
          git push
